name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -q
      - name: Quickstart smoke
        run: python scripts/quickstart_smoke.py
      - name: Hermes transition plan smoke
        run: python scripts/factoryctl.py transition-plan --card examples/minimal-hermes-project/card.md --from-status draft --to-status ready --out "$RUNNER_TEMP/overkill-transition-plan.json"
      - name: Hermes transition hook smoke
        run: |
          mkdir -p "$RUNNER_TEMP/overkill-hook"
          python adapters/hermes/transition_hook.py \
            --card examples/minimal-hermes-project/card.md \
            --from-status draft \
            --to-status ready \
            --ledger "$RUNNER_TEMP/overkill-hook/worker-ledger.json" \
            --out "$RUNNER_TEMP/overkill-hook/ready-hook-result.json" \
            --report-only
          python adapters/hermes/transition_hook.py \
            --card examples/minimal-hermes-project/card.md \
            --from-status ready \
            --to-status done \
            --ledger "$RUNNER_TEMP/overkill-hook/worker-ledger.json" \
            --out "$RUNNER_TEMP/overkill-hook/done-hook-blocked.json" \
            --report-only
          if python adapters/hermes/transition_hook.py \
            --card examples/minimal-hermes-project/card.md \
            --from-status ready \
            --to-status done \
            --ledger "$RUNNER_TEMP/overkill-hook/worker-ledger.json" \
            --out "$RUNNER_TEMP/overkill-hook/done-hook-enforced-block.json"; then
            echo "Expected blocked done transition to fail under --enforce"
            exit 1
          fi
      - name: Hermes adapter compatibility check
        run: python adapters/hermes/compatibility-check.py
      - name: Public JSON artifact validation
        run: python scripts/validate_public_json_artifacts.py
      - name: Planning bundle validation
        run: python scripts/validate_planning_bundles.py
      - name: Public surface sync
        run: python scripts/validate_public_surface_sync.py
      - name: Worker profile validation
        run: python scripts/validate_worker_profiles.py
      - name: Supply-chain proof
        run: python scripts/supply_chain_proof.py --check --no-write
      - name: Secret safety scan
        run: python scripts/secret_safety_scan.py
      - name: Public safety scan
        run: python scripts/public_safety_scan.py
